services:
  postgres:
    container_name: postgres
    image: postgres:16
    restart: always
    ports:
      - "${DATABASE__PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DATABASE__USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE__NAME:-answer_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - be-answer-hub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER:-postgres} -d ${DATABASE__NAME:-answer_hub}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrations:
    container_name: alembic_migrations
    build:
      context: .
      dockerfile: ./build/app/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/app/database/migrations:/app
    volumes:
      - ./app:/app/app
      - ./run-migrations.sh:/app/run-migrations.sh:ro
    working_dir: /app/app/database/migrations
    command: ["sh", "/app/run-migrations.sh"]
    networks:
      - be-answer-hub-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    container_name: be-answer-hub
    build:
      context: .
      dockerfile: ./build/app/Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "${API__PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - be-answer-hub-network
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
    driver: local

networks:
  be-answer-hub-network:
    driver: bridge
