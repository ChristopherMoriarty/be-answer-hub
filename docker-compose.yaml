services:
  postgres:
    container_name: postgres
    image: postgres:16
    restart: always
    ports:
      - "${DATABASE__PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DATABASE__USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE__NAME:-answer_hub}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./scripts/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    networks:
      - be-answer-hub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER:-postgres} -d ${DATABASE__NAME:-answer_hub}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrations:
    container_name: alembic_migrations
    build:
      context: .
      dockerfile: ./build/app/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/app/database/migrations:/app
    volumes:
      - ./app:/app/app
      - ./scripts/run-migrations.sh:/app/scripts/run-migrations.sh:ro
    working_dir: /app/app/database/migrations
    command: ["sh", "/app/scripts/run-migrations.sh"]
    networks:
      - be-answer-hub-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  minio:
    container_name: minio
    build:
      context: .
      dockerfile: ./build/minio/Dockerfile
    restart: always
    ports:
      - "${S3__PORT:-9000}:9000"
      - "${S3__CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${S3__ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3__SECRET_KEY:-minioadmin}
      S3__BUCKET: ${S3__BUCKET:-cv-files}
    volumes:
      - ./.data/minio:/data
    networks:
      - be-answer-hub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    container_name: be-answer-hub
    build:
      context: .
      dockerfile: ./build/app/Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "${API__PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - be-answer-hub-network
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

networks:
  be-answer-hub-network:
    driver: bridge
